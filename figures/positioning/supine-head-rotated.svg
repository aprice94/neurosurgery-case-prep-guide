<svg viewBox="0 0 480 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Supine position with head rotated for a pterional approach</title>
  <desc id="desc">Top-down schematic of a supine patient with the head fixed in pins and rotated 15 to 60 degrees toward the contralateral side, an ipsilateral shoulder roll, neck slightly extended so the malar eminence is highest, and the vertex angled down.</desc>
  <rect x="6" y="6" width="468" height="328" rx="14" fill="#f6f9fc" stroke="#cdd9e6" stroke-width="1.5"/>
  <text x="24" y="32" fill="#0e2a47" font-family="system-ui,Segoe UI,Arial,sans-serif" font-size="16.5" font-weight="700">Supine — Head Rotated (Pterional / Frontotemporal)</text>
  <text x="24" y="50" fill="#7187a0" font-family="system-ui,Arial,sans-serif" font-size="11" font-style="italic">top-down view</text>

  <!-- table head-end -->
  <rect x="150" y="64" width="180" height="12" rx="4" fill="#c3d2e3" stroke="#8298b0"/>
  <text x="335" y="74" fill="#5c728c" font-family="system-ui,Arial,sans-serif" font-size="10">head of bed</text>

  <!-- midline reference -->
  <line x1="240" y1="60" x2="240" y2="250" stroke="#9fb3c8" stroke-width="1.3" stroke-dasharray="5 5"/>
  <text x="244" y="246" fill="#7187a0" font-family="system-ui,Arial,sans-serif" font-size="10">midline</text>

  <!-- torso / shoulders -->
  <path d="M180 250 Q180 214 214 210 L266 210 Q300 214 300 250 L292 320 L188 320 Z" fill="#e8eff6" stroke="#4d6b88" stroke-width="2"/>
  <!-- ipsilateral shoulder roll -->
  <ellipse cx="296" cy="220" rx="30" ry="11" transform="rotate(-24 296 220)" fill="#b9cde0" stroke="#6f8aa6" stroke-width="1.5"/>
  <text x="312" y="206" fill="#33485f" font-family="system-ui,Arial,sans-serif" font-size="10.5">shoulder roll</text>

  <!-- head, rotated toward contralateral (image-left) -->
  <g transform="rotate(-28 214 158)">
    <ellipse cx="214" cy="158" rx="56" ry="64" fill="#f0d3b8" stroke="#c08a5b" stroke-width="2"/>
    <path d="M214 94 l-9 -16 18 0 z" fill="#f0d3b8" stroke="#c08a5b" stroke-width="2"/> <!-- nose/face up -->
    <!-- pins -->
    <circle cx="170" cy="150" r="4.5" fill="#cf3a4a"/>
    <circle cx="258" cy="150" r="4.5" fill="#cf3a4a"/>
    <circle cx="214" cy="214" r="4.5" fill="#cf3a4a"/>
  </g>
  <text x="118" y="120" fill="#0e2a47" font-family="system-ui,Arial,sans-serif" font-size="11" font-weight="600">3-pin fixation</text>

  <!-- rotation arc -->
  <path d="M240 150 A 30 30 0 0 0 214 132" fill="none" stroke="#2f8f83" stroke-width="2"/>
  <text x="196" y="128" fill="#1d6f66" font-family="system-ui,Arial,sans-serif" font-size="11" font-weight="600">15–60°</text>

  <!-- bullets -->
  <text x="24" y="276" fill="#0e2a47" font-family="system-ui,Arial,sans-serif" font-size="11.5" font-weight="700">Key set-up</text>
  <text x="24" y="293" fill="#33485f" font-family="system-ui,Arial,sans-serif" font-size="10.8">• Rotate 15–30° (MCA) up to 45–60° (ACoA, anterior temporal)  • Ipsilateral shoulder roll</text>
  <text x="24" y="309" fill="#33485f" font-family="system-ui,Arial,sans-serif" font-size="10.8">• Neck slightly extended — malar eminence is the highest point (frontal lobe falls away)</text>
  <text x="24" y="325" fill="#33485f" font-family="system-ui,Arial,sans-serif" font-size="10.8">• Vertex angled down ~15°  • Reverse Trendelenburg, head above the heart</text>
</svg>
