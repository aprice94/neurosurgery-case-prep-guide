<svg viewBox="0 0 480 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Lateral decubitus position</title>
  <desc id="desc">Coronal schematic of a patient in the lateral decubitus position on an operating table, with an axillary roll just caudal to the dependent axilla, head supported in line with the spine, arms on padded supports, hips and knees flexed with a pillow between the legs, and the body secured.</desc>
  <rect x="6" y="6" width="468" height="328" rx="14" fill="#f6f9fc" stroke="#cdd9e6" stroke-width="1.5"/>
  <text x="24" y="32" fill="#0e2a47" font-family="system-ui,Segoe UI,Arial,sans-serif" font-size="16.5" font-weight="700">Lateral Decubitus</text>
  <text x="24" y="50" fill="#7187a0" font-family="system-ui,Arial,sans-serif" font-size="11" font-style="italic">view from the head, looking down the body axis</text>

  <!-- OR table -->
  <rect x="40" y="206" width="400" height="16" rx="4" fill="#c3d2e3" stroke="#8298b0"/>
  <line x1="70" y1="222" x2="70" y2="246" stroke="#8298b0" stroke-width="3"/>
  <line x1="410" y1="222" x2="410" y2="246" stroke="#8298b0" stroke-width="3"/>

  <!-- torso cross-section lying on side -->
  <ellipse cx="210" cy="166" rx="92" ry="44" fill="#e8eff6" stroke="#4d6b88" stroke-width="2"/>
  <!-- dependent (down) side rests near table; axillary roll -->
  <ellipse cx="138" cy="196" rx="20" ry="9" fill="#b9cde0" stroke="#6f8aa6" stroke-width="1.5"/>
  <text x="40" y="250" fill="#cf3a4a" font-family="system-ui,Arial,sans-serif" font-size="10.5" font-weight="600">axillary roll</text>
  <text x="40" y="263" fill="#33485f" font-family="system-ui,Arial,sans-serif" font-size="9.6">just caudal to dependent axilla</text>
  <line x1="92" y1="240" x2="132" y2="201" stroke="#88a" stroke-width="1"/>

  <!-- head supported in line with spine -->
  <circle cx="300" cy="150" r="30" fill="#f0d3b8" stroke="#c08a5b" stroke-width="2"/>
  <rect x="286" y="182" width="28" height="10" rx="3" fill="#b9cde0" stroke="#6f8aa6" stroke-width="1.3"/>
  <text x="336" y="146" fill="#33485f" font-family="system-ui,Arial,sans-serif" font-size="10.5">head neutral,</text>
  <text x="336" y="159" fill="#33485f" font-family="system-ui,Arial,sans-serif" font-size="10.5">in line with spine</text>

  <!-- up arm on rest -->
  <rect x="150" y="96" width="120" height="12" rx="5" fill="#e8eff6" stroke="#4d6b88" stroke-width="1.5"/>
  <text x="150" y="90" fill="#33485f" font-family="system-ui,Arial,sans-serif" font-size="10">up arm on padded rest</text>

  <!-- pad points note -->
  <text x="232" y="250" fill="#cf3a4a" font-family="system-ui,Arial,sans-serif" font-size="10.5" font-weight="600">pad: peroneal (fibular head) &amp; dependent ulnar nerve</text>

  <!-- bullets -->
  <text x="24" y="290" fill="#0e2a47" font-family="system-ui,Arial,sans-serif" font-size="11.5" font-weight="700">Key set-up</text>
  <text x="24" y="307" fill="#33485f" font-family="system-ui,Arial,sans-serif" font-size="10.8">• Axillary roll caudal to the dependent axilla — protects the brachial plexus / axillary vessels</text>
  <text x="24" y="323" fill="#33485f" font-family="system-ui,Arial,sans-serif" font-size="10.8">• Flex hips/knees, pillow between legs  • Secure with bean bag / tape  • Both arms padded &amp; supported</text>
</svg>
