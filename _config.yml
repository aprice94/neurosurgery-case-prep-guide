title: Pterion Prep
description: >-
  Structured neurosurgical case-preparation guides — positioning, approaches,
  step-by-step technique, figures, and dictation-ready operative-note templates
  across cranial, spine, vascular, functional, peripheral-nerve, and pediatric neurosurgery.
url: "https://aprice94.github.io"
baseurl: "/neurosurgery-case-prep-guide"
github_repo: "https://github.com/aprice94/neurosurgery-case-prep-guide"
cranipro_url: "/cranipro/"
logo: "/assets/img/pterion-prep-logo.png"
mark: "/assets/img/pterion-prep-mark.png"

# GitHub-flavored markdown so tables/pipes render exactly like github.com
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# Apply our custom layout to every page (no external theme — fully self-styled)
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Rewrite relative .md links to their built HTML pages
plugins:
  - jekyll-relative-links
relative_links:
  enabled: true
  collections: false

exclude:
  - .gitignore
  - CONTRIBUTING.md
  - LICENSE
  - README.md
  - Gemfile
  - Gemfile.lock
